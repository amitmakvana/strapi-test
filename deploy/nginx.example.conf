server {
    listen 443 ssl http2;
    server_name blog.fivetecglobalcapital.com;

    ssl_certificate     /etc/letsencrypt/live/blog.fivetecglobalcapital.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.fivetecglobalcapital.com/privkey.pem;

    location = / {
        return 302 https://blog.fivetecglobalcapital.com/admin;
    }

    location / {
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name blog.fivetecglobalcapital.com;
    return 301 https://blog.fivetecglobalcapital.com$request_uri;
}
